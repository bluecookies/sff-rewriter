name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Create release
        run: gh release create ${{ github.ref_name }} --title ${{ github.ref_name }} --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}

  build-binaries:
    needs: create-release
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: sff-formatter.exe
            asset: sff-fmt-windows-x64.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: sff-formatter
            asset: sff-fmt-darwin-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: rewriter

      - name: Rename binary
        shell: bash
        run: cp rewriter/target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.asset }}

      - name: Upload binary
        shell: bash
        run: gh release upload ${{ github.ref_name }} ${{ matrix.asset }} --clobber
        env:
          GH_TOKEN: ${{ github.token }}

  package-extension:
    needs: create-release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci
        working-directory: vscode

      - name: Package extension
        run: npx vsce package
        working-directory: vscode

      - name: Upload vsix
        run: gh release upload ${{ github.ref_name }} vscode/*.vsix --clobber
        env:
          GH_TOKEN: ${{ github.token }}
